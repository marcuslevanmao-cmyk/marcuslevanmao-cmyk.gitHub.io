<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morph Background</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Century Gothic', sans-serif;
      cursor: pointer;
      overflow: hidden;

      /* STARTING IMAGE */
      background-image: url('https://static.vecteezy.com/system/resources/thumbnails/024/618/122/small/elegant-chapel-with-altar-pew-and-chandelier-illuminated-by-electric-lamp-generated-by-ai-free-photo.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* COLOR MORPH LAYER */
    .bg {
      position: fixed;
      inset: 0;
      background-color: #0023BE;
      transform: scale(0);
      transform-origin: center;
      transition: transform 0.7s ease, background-color 0.4s ease;
      z-index: 0;
    }

    .bg.active {
      transform: scale(1);
    }

    /* TEXT */
    .text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      color: white;
      font-size: 2rem;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      z-index: 1;
    }

    .text.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="bg" id="bg"></div>
  <div class="text" id="text">Internal Thoughts</div>

  <script>
    const bg = document.getElementById('bg');
    const text = document.getElementById('text');

    let isActive = false;
    let currentColor = null;

    // Prevent right-click menu
    document.addEventListener('contextmenu', e => e.preventDefault());

    document.addEventListener('mousedown', (e) => {
      let color;

      if (e.button === 0) {
        color = '#dfc7a7';
      } else if (e.button === 2) {
        color = '#7fa6c9';
      } else if (e.button === 1) {
        color = '#c0392b';
      }

      if (!color) return;

      // If clicking SAME color again → revert to image
      if (isActive && currentColor === color) {
        bg.classList.remove('active');
        text.classList.remove('show');
        isActive = false;
        currentColor = null;
        return;
      }

      // First activation → play morph animation
      if (!isActive) {
        bg.style.backgroundColor = color;
        bg.classList.add('active');
        text.classList.add('show');
        isActive = true;
        currentColor = color;
      } else {
        // Switch to different color smoothly
        bg.style.backgroundColor = color;
        currentColor = color;
      }
    });
  </script>

</body>
</html>
